<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro – I.E. Pedro A. Labarthe</title>
  <!-- REGISTRO: formulario de registro de nuevo usuario (admin o apoderado) -->

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/feedback.css" />
  <link rel="stylesheet" href="/css/register.css" />
</head>
<body>
  <div class="register-wrapper">
    <div class="text-center mb-4">
      <img src="../images/logo.png" alt="logo" width="100" class="mb-3 img-fluid" />
      <h1 class="title-school mb-1">I.E. Pedro A. Labarthe</h1>
      <p class="subtitle-school mb-0">Crear cuenta de apoderado</p>
    </div>

    <div class="register-card p-4 p-sm-5">
      <div class="alert alert-danger d-none" id="errorMsg">
        <i class="fa-solid fa-circle-exclamation me-2"></i>
        <span id="errorText"></span>
      </div>
      <div class="alert alert-success d-none" id="successMsg">
        <i class="fa-solid fa-check-circle me-2"></i>
        <span id="successText"></span>
      </div>

      <form id="registerForm" autocomplete="off" novalidate>
        <div class="row g-3 mb-3">
          <div class="col-sm-6">
            <label class="form-label fw-semibold small">Nombre <span class="text-danger">*</span></label>
            <div class="input-group">
              <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
              <input type="text" id="nombre" class="form-control solo-letras" placeholder="Nombres" required />
            </div>
          </div>
          <div class="col-sm-6">
            <label class="form-label fw-semibold small">Apellido <span class="text-danger">*</span></label>
            <div class="input-group">
              <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
              <input type="text" id="apellido" class="form-control solo-letras" placeholder="Apellidos" required />
            </div>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold small">Correo electrónico <span class="text-danger">*</span></label>
          <div class="input-group">
            <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
            <input type="email" id="correo" class="form-control" placeholder="ejemplo@correo.com" required />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold small">Contraseña <span class="text-danger">*</span></label>
          <div class="input-group">
            <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
            <input type="password" id="contraseña" class="form-control" placeholder="Mínimo 8 caracteres" required minlength="8" />
            <button class="btn btn-light border" type="button" id="togglePwd">
              <i class="fa-solid fa-eye" id="eyeIcon"></i>
            </button>
          </div>
          <div class="mt-2 p-3 rounded-3 bg-light border" style="font-size:.8rem;">
            <div class="row g-1">
              <div class="col-6 d-flex align-items-center gap-2" id="req-len">
                <i class="bi bi-circle text-muted"></i> Mínimo 8 caracteres
              </div>
              <div class="col-6 d-flex align-items-center gap-2" id="req-lower">
                <i class="bi bi-circle text-muted"></i> Una minúscula
              </div>
              <div class="col-6 d-flex align-items-center gap-2" id="req-upper">
                <i class="bi bi-circle text-muted"></i> Una mayúscula
              </div>
              <div class="col-6 d-flex align-items-center gap-2" id="req-num">
                <i class="bi bi-circle text-muted"></i> Un número
              </div>
              <div class="col-6 d-flex align-items-center gap-2" id="req-special">
                <i class="bi bi-circle text-muted"></i> Un carácter especial
              </div>
            </div>
          </div>
        </div>

        <div class="row g-3 mb-3">
          <div class="col-sm-6">
            <label class="form-label fw-semibold small">DNI <span class="text-danger">*</span></label>
            <div class="input-group">
              <span class="input-group-text"><i class="fa-solid fa-id-card"></i></span>
              <input type="text" id="dni" class="form-control" maxlength="8" placeholder="8 dígitos" required oninput="this.value=this.value.replace(/\D/g,'')" />
            </div>
          </div>
          <div class="col-sm-6">
            <label class="form-label fw-semibold small">Teléfono <span class="text-danger">*</span></label>
            <div class="input-group">
              <span class="input-group-text"><i class="fa-solid fa-phone"></i></span>
              <input type="text" id="telefono" class="form-control" maxlength="9" placeholder="9 dígitos" required oninput="this.value=this.value.replace(/\D/g,'')" />
            </div>
          </div>
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold small">Dirección <span class="text-danger">*</span></label>
            <div class="input-group">
              <span class="input-group-text"><i class="fa-solid fa-house"></i></span>
              <input type="text" id="direccion" class="form-control" placeholder="Ej: Av. Los Olivos 123" required />
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold small">Parentesco <span class="text-danger">*</span></label>
          <select id="parentesco" class="form-select" required>
            <option value="" disabled selected>Selecciona...</option>
            <option value="Padre">Padre</option>
            <option value="Madre">Madre</option>
            <option value="Tutor">Tutor</option>
            <option value="Apoderado Legal">Apoderado Legal</option>
            <option value="Otro">Otro</option>
          </select>
        </div>

        <button type="submit" class="btn btn-register w-100 mb-3" id="btnSubmit">
          <i class="fa-solid fa-user-plus me-2"></i>Crear cuenta
        </button>
      </form>

      <div class="text-center">
        <a href="/pages/login.html" class="btn btn-back w-100">
          <i class="fa-solid fa-arrow-left me-2"></i>Volver al inicio de sesión
        </a>
      </div>
    </div>

    <div class="text-center mt-3 text-secondary small">
      © 2026 – I.E. Pedro A. Labarthe
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/feedback.js"></script>
  <script src="/js/register.js"></script>
</body>
</html>
