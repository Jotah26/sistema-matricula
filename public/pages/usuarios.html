<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Usuarios – I.E. Pedro Labarthe</title>
  <!-- USUARIOS: gestión CRUD de usuarios del sistema (solo admin) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link href="/css/sidebar.css" rel="stylesheet" />
  <link href="/css/app.css" rel="stylesheet" />
  <link href="/css/feedback.css" rel="stylesheet" />
</head>

<body class="bg-light">
  <!-- ① GUARD -->
  <script src="/js/guard.js"></script>

  <div class="container-fluid">
    <div class="row min-vh-100">

      <!-- SIDEBAR (dinámico) -->
      <div id="sidebar-container" class="col-auto p-0"></div>

      <!-- ══════════ MAIN ══════════ -->
      <main class="col p-0">

        <!-- Topbar -->
        <div class="bg-white border-bottom px-4 py-3 d-flex justify-content-between align-items-center">
          <h4 class="playfair mb-0" style="color:#0a1628;">Usuarios Registrados</h4>
          <div class="d-flex align-items-center gap-2">
            <span class="badge bg-light border text-secondary px-3 py-2">Periodo 2026</span>
            <button class="btn btn-outline-secondary btn-sm"><i class="bi bi-bell"></i></button>
          </div>
        </div>

        <!-- Content -->
        <div class="p-4">

          <!-- Filtros -->
          <div class="card border-0 shadow-sm mb-4">
            <div class="card-body">
              <div class="row g-3 align-items-end">
                <div class="col-md-4">
                  <div class="input-group">
                    <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                    <input type="text" id="inputBuscar" class="form-control" placeholder="Buscar por nombre o DNI..."
                      oninput="filtrarTabla()" />
                  </div>
                </div>
                <div class="col-md-2">
                  <select id="selectRol" class="form-select" onchange="filtrarTabla()">
                    <option value="">Todos los roles</option>
                    <option value="Admin">Administrador</option>
                    <option value="Apoderado">Apoderado</option>
                  </select>
                </div>
                <div class="col-md-2">
                  <button class="btn btn-outline-secondary w-100" onclick="limpiarFiltros()">
                    <i class="bi bi-arrow-counterclockwise me-1"></i>Limpiar
                  </button>
                </div>
                <div class="col-md-4 text-md-end d-flex gap-2 justify-content-end">
                  <button class="btn fw-medium px-4" style="background:#0a1628;color:#fff;border-radius:9px;"
                    onclick="abrirModal('nuevo')">
                    <i class="bi bi-person-plus me-2"></i>Nuevo usuario
                  </button>
                </div>
              </div>
            </div>
          </div>

          <!-- Tabla -->
          <div class="card border-0 shadow-sm">
            <div class="card-header bg-white border-0 p-4 d-flex justify-content-between align-items-center">
              <h5 class="playfair mb-0">Lista de usuarios</h5>
              <small class="text-muted" id="contadorRegistros">Cargando...</small>
            </div>
            <div class="table-responsive">
              <table class="table align-middle mb-0" id="tablaUsuarios">
                <thead class="table-light">
                  <tr>
                    <th class="ps-4">#</th>
                    <th>Nombre</th>
                    <th>DNI</th>
                    <th>Correo</th>
                    <th>Rol</th>
                    <th>Acciones</th>
                  </tr>
                </thead>
                <tbody id="tbodyUsuarios">
                  <tr>
                    <td class="ps-4 text-muted" colspan="6" class="text-center">Cargando usuarios...</td>
                  </tr>
                </tbody>
              </table>
            </div>

            <!-- Paginación -->
            <div class="border-top p-3 d-flex justify-content-between align-items-center flex-wrap gap-2">
              <small class="text-muted" id="pageInfo">Cargando...</small>

              <nav>
                <ul class="pagination pagination-sm mb-0" id="pagination">
                  <li class="page-item disabled">
                    <a class="page-link text-dark bg-light border-secondary-subtle" onclick="irPagina(paginaActual - 1)">«</a>
                  </li>

                  <li class="page-item active">
                    <a class="page-link bg-dark border-dark">1</a>
                  </li>

                  <li class="page-item disabled">
                    <a class="page-link text-dark bg-light border-secondary-subtle" onclick="irPagina(paginaActual + 1)">»</a>
                  </li>
                </ul>
              </nav>
            </div>
          </div>

        </div>
      </main>
    </div>
  </div>

  <!-- ══════════════════════════════════════
     MODAL: Nuevo / Ver / Editar usuario
══════════════════════════════════════ -->
  <div class="modal fade" id="modalUsuario" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow">

        <!-- Header -->
        <div class="modal-header text-white py-3" style="background:#0a1628;">
          <h5 class="modal-title playfair" id="modalTitulo">Nuevo usuario</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>

        <!-- Body -->
        <div class="modal-body p-4">
          <div class="row g-3">

            <!-- Validación de texto: solo permite letras (clase "solo-letras") -->
            <div class="col-sm-6">
              <label class="form-label fw-medium text-secondary" style="font-size:.84rem;">Nombre(s) <span
                  class="text-danger" id="req1">*</span></label>
              <input type="text" id="m_nombre" class="form-control solo-letras" placeholder="Ej: María" />
            </div>
            <div class="col-sm-6">
              <label class="form-label fw-medium text-secondary" style="font-size:.84rem;">Apellido(s) <span
                  class="text-danger" id="req2">*</span></label>
              <input type="text" id="m_apellido" class="form-control solo-letras" placeholder="Ej: Torres Vega" />
            </div>

            <div class="col-sm-5">
              <label class="form-label fw-medium text-secondary" style="font-size:.84rem;">DNI <span class="text-danger"
                  id="req3">*</span></label>
              <input type="text" id="m_dni" class="form-control" maxlength="8" placeholder="8 dígitos"
                oninput="this.value=this.value.replace(/\D/g,'')" />
            </div>
            <div class="col-sm-4">
              <label class="form-label fw-medium text-secondary" style="font-size:.84rem;">Teléfono</label>
              <input type="text" id="m_tel" class="form-control" maxlength="9" placeholder="9XXXXXXXX"
                oninput="this.value=this.value.replace(/\D/g,'')" />
            </div>
            <div class="col-sm-3">
              <label class="form-label fw-medium text-secondary" style="font-size:.84rem;">Parentesco</label>
              <select id="m_parentesco" class="form-select">
                <option value="">—</option>
                <option value="PADRE">Padre</option>
                <option value="MADRE">Madre</option>
                <option value="TUTOR">Tutor</option>
                <option value="APODERADO LEGAL">Apoderado Legal</option>
                <option value="OTRO">Otro</option>
              </select>
            </div>

            <div class="col-12">
              <label class="form-label fw-medium text-secondary" style="font-size:.84rem;">Correo electrónico <span
                  class="text-danger" id="req4">*</span></label>
              <input type="email" id="m_correo" class="form-control" placeholder="correo@ejemplo.com" />
            </div>

            <div class="col-sm-6" id="bloqueRol">
              <label class="form-label fw-medium text-secondary" style="font-size:.84rem;">Rol <span class="text-danger"
                  id="req5">*</span></label>
              <select id="m_rol" class="form-select">
                <option value="" disabled selected>Selecciona...</option>
                <option value="ADMIN">Administrador</option>
                <option value="APODERADO">Apoderado</option>
              </select>
            </div>
            <div class="col-sm-6">
              <label class="form-label fw-medium text-secondary" style="font-size:.84rem;">Dirección</label>
              <input type="text" id="m_dir" class="form-control" placeholder="Av. / Jr. / Calle" />
            </div>

            <!-- Contraseña solo en nuevo -->
            <div id="bloquePass">
              <div class="row g-3">
                <div class="col-sm-6">
                  <label class="form-label fw-medium text-secondary" style="font-size:.84rem;">Contraseña <span
                      class="text-danger">*</span></label>
                  <input type="password" id="m_pass" class="form-control" placeholder="Mínimo 8 caracteres" />
                </div>
                <div class="col-sm-6">
                  <label class="form-label fw-medium text-secondary" style="font-size:.84rem;">Confirmar contraseña
                    <span class="text-danger">*</span></label>
                  <input type="password" id="m_pass2" class="form-control" placeholder="Repite la contraseña" />
                </div>
              </div>
              <div class="mt-2 p-3 rounded-3 bg-light border" style="font-size:.8rem;">
                <div class="row g-1">
                  <div class="col-6 d-flex align-items-center gap-2" id="req-len">
                    <i class="bi bi-circle text-muted"></i> Mínimo 8 caracteres
                  </div>
                  <div class="col-6 d-flex align-items-center gap-2" id="req-lower">
                    <i class="bi bi-circle text-muted"></i> Una minúscula
                  </div>
                  <div class="col-6 d-flex align-items-center gap-2" id="req-upper">
                    <i class="bi bi-circle text-muted"></i> Una mayúscula
                  </div>
                  <div class="col-6 d-flex align-items-center gap-2" id="req-num">
                    <i class="bi bi-circle text-muted"></i> Un número
                  </div>
                  <div class="col-6 d-flex align-items-center gap-2" id="req-special">
                    <i class="bi bi-circle text-muted"></i> Un carácter especial
                  </div>
                </div>
              </div>
            </div>

          </div>

          <!-- Hijos (solo en modo ver para apoderado) -->
          <div id="bloqueHijosAdmin" class="mt-3 d-none">
            <hr class="my-3" />
            <h6 class="fw-bold mb-3">Hijos</h6>
            <div id="hijosListaAdmin">
              <p class="text-muted small mb-0">Cargando...</p>
            </div>
          </div>

        </div>

        <!-- Footer -->
        <div class="modal-footer border-0 pt-0">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn fw-medium px-4" id="btnGuardar"
            style="background:#0a1628;color:#fff;border-radius:9px;" onclick="guardarUsuario()">
            <i class="bi bi-check2 me-1"></i>Guardar
          </button>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/usuarios.js"></script>
  <script src="/js/feedback.js"></script>
  <script src="/js/notification.js"></script>
</body>

</html>
