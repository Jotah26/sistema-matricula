<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reporte de Matrículas – I.E. Pedro Labarthe</title>
    <!-- REPORTE: tabla de matrículas con exportación a PDF y Excel -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link href="/css/sidebar.css" rel="stylesheet" />
    <link href="/css/app.css" rel="stylesheet" />
    <link href="/css/feedback.css" rel="stylesheet" />
    <link href="/css/reporte.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <script src="/js/guard.js"></script>
    <div class="container-fluid">
    <div class="row min-vh-100">
      <div id="sidebar-container" class="col-auto p-0"></div>

        <!-- ══════════ MAIN ══════════ -->
        <main class="col p-0">
          <!-- Topbar -->
          <div
            class="bg-white border-bottom px-4 py-3 d-flex justify-content-between align-items-center no-print"
          >
            <h4 class="playfair mb-0" style="color: #0a1628">
              Reporte de Matrículas
            </h4>
            <div class="d-flex align-items-center gap-2">
              <span class="badge bg-light border text-secondary px-3 py-2">Periodo 2026</span>
              <button class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-bell"></i>
              </button>
            </div>
          </div>

          <!-- ══════════ ÁREA QUE SE IMPRIME ══════════ -->
          <div id="areaPDF" class="p-4">
            <!-- Cabecera solo visible en PDF -->
            <div
              class="pdf-header d-none align-items-center gap-3 mb-4 pb-3 border-bottom"
            >
              <div>
                <h4 class="playfair fw-bold mb-0" style="color: #0a1628">
                  I.E. Pedro Labarthe
                </h4>
                <p class="text-muted mb-0" style="font-size: 0.85rem">
                  Sistema de Matrícula — Periodo 2026
                </p>
              </div>
              <div class="ms-auto text-end">
                <h5 class="playfair mb-0" style="color: #0a1628">
                  Reporte de Matrículas
                </h5>
                <small class="text-muted"
                  >Generado el: <span id="fechaGenerado"></span
                ></small>
              </div>
            </div>

            <!-- KPIs -->
            <div class="row g-3 mb-4">
              <div class="col-6 col-md-3">
                <div class="card border-0 shadow-sm rounded-4">
                  <div
                    class="card-body d-flex justify-content-between align-items-center"
                  >
                    <div>
                      <small
                        class="text-muted text-uppercase"
                        style="font-size: 0.72rem"
                        >Total matrículas</small
                      >
                      <h3 class="fw-bold mb-0" id="kpiTotal">—</h3>
                    </div>
                    <div
                      class="bg-primary bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center"
                      style="width: 52px; height: 52px"
                    >
                      <i class="bi bi-file-earmark-text fs-4 text-primary"></i>
                    </div>
                  </div>
                </div>
              </div>
              <div class="col-6 col-md-3">
                <div class="card border-0 shadow-sm rounded-4">
                  <div
                    class="card-body d-flex justify-content-between align-items-center"
                  >
                    <div>
                      <small
                        class="text-muted text-uppercase"
                        style="font-size: 0.72rem"
                        >Aprobadas</small
                      >
                      <h3 class="fw-bold text-success mb-0" id="kpiAprobadas">—</h3>
                    </div>
                    <div
                      class="bg-success bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center"
                      style="width: 52px; height: 52px"
                    >
                      <i class="bi bi-check-circle fs-4 text-success"></i>
                    </div>
                  </div>
                </div>
              </div>
              <div class="col-6 col-md-3">
                <div class="card border-0 shadow-sm rounded-4">
                  <div
                    class="card-body d-flex justify-content-between align-items-center"
                  >
                    <div>
                      <small
                        class="text-muted text-uppercase"
                        style="font-size: 0.72rem"
                        >Pendientes</small
                      >
                      <h3 class="fw-bold text-warning mb-0" id="kpiPendientes">—</h3>
                    </div>
                    <div
                      class="bg-warning bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center"
                      style="width: 52px; height: 52px"
                    >
                      <i class="bi bi-hourglass-split fs-4 text-warning"></i>
                    </div>
                  </div>
                </div>
              </div>
              <div class="col-6 col-md-3">
                <div class="card border-0 shadow-sm rounded-4">
                  <div
                    class="card-body d-flex justify-content-between align-items-center"
                  >
                    <div>
                      <small
                        class="text-muted text-uppercase"
                        style="font-size: 0.72rem"
                        >Rechazadas</small
                      >
                      <h3 class="fw-bold text-danger mb-0" id="kpiRechazadas">—</h3>
                    </div>
                    <div
                      class="bg-danger bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center"
                      style="width: 52px; height: 52px"
                    >
                      <i class="bi bi-x-circle fs-4 text-danger"></i>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Tabla -->
            <div class="card border-0 shadow-sm rounded-4">
              <div
                class="card-header bg-white border-0 p-4 d-flex justify-content-between align-items-center"
              >
                <h5 class="playfair mb-0">Detalle de Matrículas</h5>
                <div class="d-flex gap-2 no-print">
                  <button
                    class="btn btn-outline-danger btn-sm"
                    onclick="exportarPDF()"
                  >
                    <i class="bi bi-filetype-pdf me-1"></i>PDF
                  </button>
                  <button
                    class="btn btn-outline-success btn-sm"
                    onclick="exportarExcel()"
                  >
                    <i class="bi bi-filetype-xls me-1"></i>Excel
                  </button>
                </div>
              </div>

              <div class="table-responsive">
                <table class="table align-middle mb-0" id="tablaReporte">
                  <thead class="table-light">
                    <tr>
                      <th class="ps-4">N°</th>
                      <th>Alumno</th>
                      <th>DNI</th>
                      <th>Grado</th>
                      <th>Sección</th>
                      <th>Estado</th>
                      <th>Fecha</th>
                    </tr>
                  </thead>
                  <tbody id="reporteBody">
                    <tr><td colspan="7" class="text-center text-muted py-4">Cargando...</td></tr>
                  </tbody>
                </table>
              </div>

              <div
                class="p-4 border-top d-flex justify-content-between align-items-center flex-wrap gap-2"
              >
                <small class="text-muted" id="infoRegistros">Cargando...</small>
                <nav class="no-print">
                  <ul class="pagination pagination-sm mb-0" id="paginacionReporte">
                    <li class="page-item disabled"><a class="page-link text-dark bg-light border-secondary-subtle">«</a></li>
                    <li class="page-item active"><a class="page-link bg-dark border-dark text-white">1</a></li>
                    <li class="page-item disabled"><a class="page-link text-dark bg-light border-secondary-subtle">»</a></li>
                  </ul>
                </nav>
              </div>
            </div>
          </div>
          <!-- /areaPDF -->
        </main>
      </div>
    </div>

<!-- jsPDF -->
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.5.31/dist/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/reporte.js"></script>
  <script src="/js/feedback.js"></script>
  <script src="/js/notification.js"></script>
  </body>
</html>
