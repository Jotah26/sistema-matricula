<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar sesión – I.E. Pedro A. Labarthe</title>
    <!-- LOGIN: formulario de inicio de sesión con JWT -->

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/feedback.css" />
    <link rel="stylesheet" href="/css/login.css" />
  </head>

  <body>
    <div class="login-wrapper">
      <!-- HEADER -->
      <div class="text-center mb-4">
        <img
          src="../images/logo.png"
          alt="logo"
          width="120"
          class="mb-3 img-fluid"
        />
        <h1 class="title-school mb-1">I.E. Pedro A. Labarthe</h1>
        <p class="subtitle-school mb-0">
          Sistema de Matrícula Escolar · Lima, Perú
        </p>
      </div>

      <!-- CARD -->
      <div class="login-card p-4 p-sm-5">
        <!-- ERROR -->
        <div class="alert alert-danger d-none" id="errorMsg">
          <i class="fa-solid fa-circle-exclamation me-2"></i>
          <span id="errorText"></span>
        </div>

        <!-- EMAIL -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Correo electrónico</label>
          <div class="input-group">
            <span class="input-group-text"
              ><i class="fa-solid fa-envelope"></i
            ></span>
            <input
              type="email"
              id="email"
              class="form-control"
              placeholder="ejemplo@correo.com"
              autocomplete="email"
            />
          </div>
        </div>

        <!-- PASSWORD -->
        <div class="mb-2">
          <label class="form-label fw-semibold">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text"
              ><i class="fa-solid fa-lock"></i
            ></span>
            <input
              type="password"
              id="password"
              class="form-control"
              placeholder="••••••••"
              autocomplete="current-password"
            />
            <button class="btn btn-light border" id="togglePwd" type="button">
              <i class="fa-solid fa-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <div class="text-end mb-4">
          <a href="/pages/recuperar.html" class="forgot-link">¿Olvidaste tu contraseña?</a>
        </div>

        <!-- BOTÓN LOGIN -->
        <button class="btn btn-login w-100 mb-3" id="btnLogin">
          <i class="fa-solid fa-right-to-bracket me-2"></i>Ingresar
        </button>

        <!-- DIVIDER -->
        <div class="text-center text-secondary mb-3">¿No tienes cuenta?</div>

        <!-- REGISTER -->
        <button class="btn btn-register w-100" onclick="window.location.href='/pages/register.html'">
          <i class="fa-solid fa-user-plus me-2"></i>
          Registrarse como apoderado
        </button>
      </div>

      <!-- FOOTER -->
      <div class="text-center mt-3 text-secondary small">
        © 2026 – I.E. Pedro A. Labarthe
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/feedback.js"></script>
    <script src="/js/login.js"></script>
  </body>
</html>
